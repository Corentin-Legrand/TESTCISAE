name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Tax-Simulator.sln

      - name: Build
        run: dotnet build Tax-Simulator.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Tax-Simulator.sln --no-build --configuration Release --verbosity normal
